<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 Old Mobile Parts Finder - सभी Sites</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);padding:15px;min-height:100vh;}
        .container{max-width:1200px;margin:auto;background:white;border-radius:25px;box-shadow:0 25px 50px rgba(0,0,0,0.2);overflow:hidden;}
        .header{padding:40px 20px;text-align:center;background:linear-gradient(135deg,#ef4444,#f59e0b);color:white;}
        .header h1{font-size:2.8em;margin:0;font-weight:700;}
        .ads-top{padding:15px;background:#f8fafc;border-bottom:3px solid #3b82f6;text-align:center;}
        .search-container{padding:35px 30px;background:linear-gradient(135deg,#f8fafc,#e2e8f0);border-bottom:3px solid #3b82f6;}
        .search-box{position:relative;max-width:900px;margin:0 auto;}
        #searchInput{width:100%;padding:22px 80px 22px 30px;border:3px solid #cbd5e1;border-radius:50px;font-size:20px;font-weight:500;box-shadow:0 8px 25px rgba(0,0,0,0.1);}
        #searchInput:focus{border-color:#3b82f6;box-shadow:0 12px 35px rgba(59,130,246,0.3);}
        .search-btn{position:absolute;right:5px;top:50%;transform:translateY(-50%);padding:18px 35px;background:linear-gradient(135deg,#3b82f6,#1e40af);color:white;border:none;border-radius:40px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 8px 25px rgba(59,130,246,0.4);transition:all 0.3s;z-index:10;}
        .search-btn:hover{transform:translateY(-50%) translateX(2px);box-shadow:0 12px 35px rgba(59,130,246,0.5);}
        .results{padding:40px;}
        .listing-card{margin-bottom:30px;padding:30px;background:white;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.1);border-left:6px solid #10b981;transition:all 0.4s;}
        .listing-card:hover{transform:translateY(-8px);}
        .part-title{font-size:2em;font-weight:800;color:#1e293b;margin-bottom:15px;}
        .price-big{font-size:3.2em;color:#059669;font-weight:900;}
        .details-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;margin:20px 0;}
        .source-badge{padding:12px 20px;border-radius:30px;font-weight:700;font-size:16px;color:white;display:inline-flex;align-items:center;gap:8px;}
        .maxbhi{background:linear-gradient(135deg,#8b5cf6,#7c3aed);}
        .olx{background:linear-gradient(135deg,#f97316,#ea580c);}
        .cashify{background:linear-gradient(135deg,#059669,#047857);}
        .facebook{background:linear-gradient(135deg,#1877f2,#1d4ed8);}
        .indiamart{background:linear-gradient(135deg,#14b8a6,#0d9488);}
        .location-badge{background:#f3f4f6;color:#64748b;padding:8px 16px;border-radius:20px;font-weight:600;}
        .buy-redirect{width:100%;padding:25px 20px;background:linear-gradient(135deg,#ef4444,#dc2626);color:white;border:none;border-radius:20px;font-size:1.6em;font-weight:800;cursor:pointer;margin-top:25px;box-shadow:0 10px 30px rgba(239,68,68,0.4);}
        .buy-redirect:hover{transform:scale(1.03);}
        .no-results{text-align:center;padding:80px 40px;color:#64748b;}
        .loading{text-align:center;padding:60px;color:#3b82f6;}
        .ads-bottom{padding:25px;background:#f8fafc;border-top:3px solid #3b82f6;text-align:center;}
        @media(max-width:768px){
            .header h1{font-size:2.2em;}
            .search-btn{padding:16px 30px;font-size:16px;right:10px;}
            #searchInput{padding:20px 70px 20px 25px;font-size:18px;}
        }
    </style>
</head>
<body>
    <!-- TOP ADS -->
    <div class="ads-top">
        <script async="async" data-cfasync="false" src="https://pl28735283.effectivegatecpm.com/745c1ef3a6af871203febf2e53f94208/invoke.js"></script>
        <div id="container-745c1ef3a6af871203febf2e53f94208"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🔍 Old Mobile Parts Finder</h1>
            <p>Maxbhi, OLX, Cashify, IndiaMart - सभी sites से instant search</p>
        </div>
        
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="iPhone screen, Vivo motherboard, Samsung battery...">
                <button class="search-btn" onclick="doRealTimeSearch()">🔍 SEARCH</button>
            </div>
        </div>

        <div class="results" id="resultsContainer">
            <div style="text-align:center;padding:40px;color:#64748b;">
                <h3>🔥 सबसे popular old parts</h3>
                <p>कोई भी part search करें - सभी sites से results!</p>
            </div>
        </div>
    </div>

    <!-- BOTTOM ADS -->
    <div class="ads-bottom">
        <iframe src="https://omg10.com/4/10645051" width="728" height="90" frameborder="0" scrolling="no"></iframe>
    </div>

    <script>
        // ALL INDIA MOBILE PARTS MARKETPLACES
        const marketplaces = {
            maxbhi: {
                name: "Maxbhi.com",
                baseUrl: "https://www.maxbhi.com/search?q=",
                icon: "🛠️"
            },
            olx: {
                name: "OLX India", 
                baseUrl: "https://www.olx.in/items/q-",
                icon: "🛒"
            },
            cashify: {
                name: "Cashify",
                baseUrl: "https://www.cashify.in/",
                icon: "💰"
            },
            indiamart: {
                name: "IndiaMart", 
                baseUrl: "https://dir.indiamart.com/search.mp?ss=",
                icon: "🏭"
            },
            facebook: {
                name: "Facebook Marketplace",
                baseUrl: "https://www.facebook.com/marketplace/",
                icon: "📘"
            }
        };

        // SIMULATED LIVE SEARCH ACROSS ALL SITES
        function generateLiveResults(query) {
            const results = [];
            
            // Simulate Maxbhi results
            if(query.toLowerCase().includes('iphone') || query.toLowerCase().includes('screen')) {
                results.push({
                    name: `${query} (Maxbhi)`,
                    price: 6500 + Math.floor(Math.random() * 2000),
                    source: "Maxbhi.com",
                    url: `https://www.maxbhi.com/search?q=${encodeURIComponent(query)}`,
                    condition: "98% Perfect",
                    location: "Delhi"
                });
            }
            
            // OLX results
            results.push({
                name: `${query} (OLX Verified)`,
                price: 5500 + Math.floor(Math.random() * 1500),
                source: "OLX India",
                url: `https://www.olx.in/items/q-${encodeURIComponent(query)}`,
                condition: "95% Working",
                location: "Your City"
            });
            
            // IndiaMart wholesale
            results.push({
                name: `${query} (Wholesale)`,
                source: "IndiaMart",
                price: 4500 + Math.floor(Math.random() * 1000),
                url: `https://dir.indiamart.com/search.mp?ss=${encodeURIComponent(query)}`,
                condition: "Bulk Deal",
                location: "Panipat"
            });
            
            return results;
        }

        function doRealTimeSearch() {
            const query = document.getElementById('searchInput').value.trim();
            
            if(query.length < 2) {
                alert('कम से कम 2 letters type करें!');
                return;
            }

            // Show loading
            document.getElementById('resultsContainer').innerHTML = `
                <div class="loading">
                    <h2>🔍 Searching ${query} across all sites...</h2>
                    <p>Maxbhi, OLX, Cashify, IndiaMart, Facebook</p>
                </div>
            `;

            // Simulate API delay (real sites search)
            setTimeout(() => {
                const results = generateLiveResults(query);
                showResults(results, query);
            }, 800);
        }

        function showResults(data, query) {
            const container = document.getElementById('resultsContainer');
            
            if(data.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <h3>😔 "${query}" anywhere नहीं मिला</h3>
                        <p>Try: iPhone screen, Vivo motherboard, Samsung battery</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div style="text-align:center;margin-bottom:40px;">
                    <h2 style="color:#1e293b;font-size:2.2em;">${data.length} deals found for "${query}"</h2>
                    <p style="color:#64748b;font-size:18px;">Maxbhi, OLX, IndiaMart से live prices</p>
                </div>
                ${data.map((listing) => `
                    <div class="listing-card">
                        <div class="part-title">${listing.name}</div>
                        <div class="price-big">₹${listing.price.toLocaleString()}</div>
                        <div class="details-row">
                            <div>
                                <span class="source-badge ${listing.source.toLowerCase().replace(/ /g,'')}">
                                    ${getSourceIcon(listing.source)} ${listing.source}
                                </span>
                                <span class="location-badge">${listing.location}</span>
                            </div>
                            <div style="color:#64748b;font-size:18px;">${listing.condition}</div>
                        </div>
                        <button class="buy-redirect" onclick="buyNow('${listing.url}', '${listing.name}')">
                            🚀 BUY NOW - Direct ${listing.source}
                        </button>
                    </div>
                `).join('')}
            `;
        }

        function getSourceIcon(source) {
            const icons = {
                'Maxbhi.com': '🛠️', 'OLX India': '🛒', 
                'Cashify': '💰', 'IndiaMart': '🏭', 'Facebook Marketplace': '📘'
            };
            return icons[source] || '🔍';
        }

        function buyNow(url, name) {
            gtag_report_conversion(url); // Google Analytics (optional)
            window.open(url, '_blank');
        }

        // ENTER KEY + REAL-TIME
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') doRealTimeSearch();
        });

        document.getElementById('searchInput').addEventListener('input', function(e) {
            if(e.target.value.length >= 3) {
                doRealTimeSearch();
            }
        });

        window.onload = () => {
            // Popular searches
            document.getElementById('resultsContainer').innerHTML = `
                <div style="text-align:center;padding:60px;color:#64748b;">
                    <h2>🔥 Try these popular searches:</h2>
                    <p style="font-size:20px;margin-top:20px;">iPhone screen • Vivo motherboard • Samsung battery • Realme display</p>
                </div>
            `;
        }
    </script>
</body>
</html>
